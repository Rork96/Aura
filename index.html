        const apiKey = ""; 

        async function fetchWithRetry(url, options, retries = 3) {
          const delays = [500, 1500, 3000];
          for (let i = 0; i < retries; i++) {
            try {
              const response = await fetch(url, options);
              if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
              return await response.json();
            } catch (e) {
              if (i === retries - 1) throw e;
              await new Promise(res => setTimeout(res, delays[i]));
            }
          }
        }

        function createWavArrayBuffer(base64Data, sampleRate) {
          const binaryString = atob(base64Data);
          const len = binaryString.length;
          const bytes = new Uint8Array(len);
          for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
          
          const numChannels = 1;
          const bitsPerSample = 16;
          const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
          const blockAlign = numChannels * (bitsPerSample / 8);
          const dataSize = bytes.length;
          const buffer = new ArrayBuffer(44 + dataSize);
          const view = new DataView(buffer);

          const writeString = (view, offset, string) => {
            for (let i = 0; i < string.length; i++) { view.setUint8(offset + i, string.charCodeAt(i)); }
          };

          writeString(view, 0, 'RIFF');
          view.setUint32(4, 36 + dataSize, true);
          writeString(view, 8, 'WAVE');
          writeString(view, 12, 'fmt ');
          view.setUint32(16, 16, true);
          view.setUint16(20, 1, true);
          view.setUint16(22, numChannels, true);
          view.setUint32(24, sampleRate, true);
          view.setUint32(28, byteRate, true);
          view.setUint16(32, blockAlign, true);
          view.setUint16(34, bitsPerSample, true);
          writeString(view, 36, 'data');
          view.setUint32(40, dataSize, true);

          const pcmView = new Uint8Array(buffer, 44);
          pcmView.set(bytes);
          return buffer;
        }

        const loadLocalAudio = async (url, audioCtx) => {
           try {
               const response = await fetch(url);
               const arrayBuffer = await response.arrayBuffer();
               return await audioCtx.decodeAudioData(arrayBuffer);
           } catch(e) {
               console.warn("Failed to load local audio:", e);
               return null;
           }
        };

        const generateGeminiTTS = async (text, voiceName, audioCtx) => {
          if (LOCAL_AUDIO_ASSETS && LOCAL_AUDIO_ASSETS[text]) {
              return await loadLocalAudio(LOCAL_AUDIO_ASSETS[text], audioCtx);
          }
          if (!apiKey) return null;

          try {
            const payload = {
              contents: [{ parts: [{ text: `Say in a very close, soft, slow ASMR whisper: ${text}` }] }],
              generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } }
              },
              model: "gemini-2.5-flash-preview-tts"
            };

            const data = await fetchWithRetry(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
              { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
            );

            const inlineData = data?.candidates?.[0]?.content?.parts?.[0]?.inlineData;
            if (!inlineData) return null;

            let sampleRate = 24000;
            const rateMatch = (inlineData.mimeType || "").match(/rate=(\d+)/);
            if (rateMatch) sampleRate = parseInt(rateMatch[1], 10);

            const wavBuffer = createWavArrayBuffer(inlineData.data, sampleRate);
            return await audioCtx.decodeAudioData(wavBuffer);
          } catch (err) {
            console.warn("Gemini TTS Error (Fallback will be used):", err);
            return null;
          }
        };

        // ------------------------------------------------------------------

        function App() {
          const [showSplash, setShowSplash] = useState(true);
          const [activeExercise, setActiveExercise] = useState(null);
          const [selectedBgSound, setSelectedBgSound] = useState('none');
          
          // Audio & Interaction Settings

          const [isDimmed, setIsDimmed] = useState(false);

          const [isGeneratingVoice, setIsGeneratingVoice] = useState(false);
          
          // Runtime State
          const [isWarmup, setIsWarmup] = useState(false);
          const [warmupTimeLeft, setWarmupTimeLeft] = useState(0);
          const [isRunning, setIsRunning] = useState(false);
          const [currentPhaseIndex, setCurrentPhaseIndex] = useState(0);
          const [timeLeft, setTimeLeft] = useState(0);
          const [cycles, setCycles] = useState(0);

          const audioCtxRef = useRef(null);
          const breathSourceRef = useRef(null);
          const activeVoiceSourceRef = useRef(null);
          const aiVoiceCache = useRef({});
          const bgNodesRef = useRef({ source: null, gain: null, lfo: null });
          const noiseBuffersRef = useRef({ pink: null, brown: null });
          const abortLoadRef = useRef(false);

          useEffect(() => {
            if (window.speechSynthesis) window.speechSynthesis.getVoices();
            const timer = setTimeout(() => setShowSplash(false), 2500);
            return () => clearTimeout(timer);
          }, []);

          const initAudioCtx = () => {
            if (!audioCtxRef.current) {
              const Ctx = window.AudioContext || window.webkitAudioContext;
              audioCtxRef.current = new Ctx();
            }
            if (audioCtxRef.current.state === 'suspended') {
              audioCtxRef.current.resume();
            }
            return audioCtxRef.current;
          };

          const stopAudioNode = (sourceKey, gainKey) => {
            if (audioCtxRef.current && audioCtxRef.current[sourceKey]) {
              try { audioCtxRef.current[sourceKey].stop(); } catch(e){}
              try { audioCtxRef.current[sourceKey].disconnect(); } catch(e){}
              audioCtxRef.current[sourceKey] = null;
            }
          };

          const triggerVibration = (type) => {
            if (!vibrationEnabled || !navigator.vibrate) return;
            // Different patterns for different phases
            if (type === 'inhale') navigator.vibrate([40, 60, 40]);
            else if (type === 'exhale') navigator.vibrate([50]);
            else if (type === 'hold') navigator.vibrate([20]); // tiny bump
            else if (type === 'warmup') navigator.vibrate([100]); // stronger bump
          };

          const getNoiseBuffer = (ctx, type) => {
            if (noiseBuffersRef.current[type]) return noiseBuffersRef.current[type];
            const bufferSize = ctx.sampleRate * 3;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const output = buffer.getChannelData(0);
            
            if (type === 'pink') {
              let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
              for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                output[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
                b6 = white * 0.115926;
              }
            } else { 
              let lastOut = 0;
              for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3.5; 
              }
            }
            noiseBuffersRef.current[type] = buffer;
            return buffer;
          };

          // Background Ambience
          useEffect(() => {
            if (showSplash) return;
            const ctx = initAudioCtx();

            if (bgNodesRef.current.source) {
              try { bgNodesRef.current.source.stop(); } catch(e){}
              bgNodesRef.current.source.disconnect();
            }
            if (bgNodesRef.current.lfo) {
              try { bgNodesRef.current.lfo.stop(); } catch(e){}
              bgNodesRef.current.lfo.disconnect();
            }

            if (selectedBgSound === 'none') return;

            const masterGain = ctx.createGain();
            masterGain.gain.value = 0.3; 
            masterGain.connect(ctx.destination);
            bgNodesRef.current.gain = masterGain;

            const source = ctx.createBufferSource();
            source.loop = true;

            if (selectedBgSound === 'rain') {
              source.buffer = getNoiseBuffer(ctx, 'pink');
              const filter = ctx.createBiquadFilter();
              filter.type = 'lowpass';
              filter.frequency.value = 1000;
              source.connect(filter);
              filter.connect(masterGain);
            } else if (selectedBgSound === 'ocean') {
              source.buffer = getNoiseBuffer(ctx, 'brown');
              const filter = ctx.createBiquadFilter();
              filter.type = 'lowpass';
              filter.frequency.value = 400;
              const waveGain = ctx.createGain();
              waveGain.gain.value = 0.5;
              const lfo = ctx.createOscillator();
              lfo.type = 'sine';
              lfo.frequency.value = 0.1;
              const lfoGain = ctx.createGain();
              lfoGain.gain.value = 0.5;
              lfo.connect(lfoGain);
              lfoGain.connect(waveGain.gain);
              source.connect(filter);
              filter.connect(waveGain);
              waveGain.connect(masterGain);
              lfo.start();
              bgNodesRef.current.lfo = lfo;
            } else if (selectedBgSound === 'wind') {
              source.buffer = getNoiseBuffer(ctx, 'brown');
              const filter = ctx.createBiquadFilter();
              filter.type = 'bandpass';
              filter.frequency.value = 600;
              filter.Q.value = 0.6;
              source.connect(filter);
              filter.connect(masterGain);
            }

            source.start();
            bgNodesRef.current.source = source;

            return () => {
              if (bgNodesRef.current.source) {
                try { bgNodesRef.current.source.stop(); } catch(e){}
              }
            };
          }, [selectedBgSound, showSplash]);

          const playBreathSound = (type, durationSecs) => {
            if (!breathSoundEnabled) return;
            const ctx = initAudioCtx();

            if (breathSourceRef.current) {
              try { breathSourceRef.current.stop(); } catch (e) {}
            }

            const now = ctx.currentTime;

            if (type === 'hold') {
              const osc = ctx.createOscillator();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(45, now); 
              const gain = ctx.createGain();
              gain.gain.setValueAtTime(0, now);
              gain.gain.linearRampToValueAtTime(0.06, now + 0.5); 
              gain.gain.setValueAtTime(0.06, now + Math.max(0.5, durationSecs - 0.5));
              gain.gain.linearRampToValueAtTime(0, now + durationSecs); 
              
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start(now);
              osc.stop(now + durationSecs);
              breathSourceRef.current = osc;
              return;
            }

            const source = ctx.createBufferSource();
            source.buffer = getNoiseBuffer(ctx, 'brown');
            source.loop = true;
            
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.Q.value = 0.8; 

            const gainNode = ctx.createGain();

            source.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(ctx.destination);

            if (type === 'inhale') {
              filter.frequency.setValueAtTime(200, now);
              filter.frequency.exponentialRampToValueAtTime(900, now + durationSecs);
              gainNode.gain.setValueAtTime(0.01, now);
              gainNode.gain.linearRampToValueAtTime(0.4, now + durationSecs);
            } else { 
              filter.frequency.setValueAtTime(900, now);
              filter.frequency.exponentialRampToValueAtTime(150, now + durationSecs);
              gainNode.gain.setValueAtTime(0.4, now);
              gainNode.gain.linearRampToValueAtTime(0.01, now + durationSecs);
            }

            source.start(now);
            source.stop(now + durationSecs);
            breathSourceRef.current = source;
          };

          const speakCommand = (text) => {
            if (!voiceEnabled) return;

            if (activeVoiceSourceRef.current) {
              try { activeVoiceSourceRef.current.stop(); } catch(e){}
            }
            if (window.speechSynthesis) window.speechSynthesis.cancel(); 

            if (voiceProfile === 'kore' || voiceProfile === 'fenrir') {
              const cacheKey = `${voiceProfile}_${text}`;
              const buffer = aiVoiceCache.current[cacheKey];
              
              if (buffer && audioCtxRef.current) {
                const source = audioCtxRef.current.createBufferSource();
                source.buffer = buffer;
                const gainNode = audioCtxRef.current.createGain();
                gainNode.gain.value = 1.4; // Make whisper clear
                source.connect(gainNode);
                gainNode.connect(audioCtxRef.current.destination);
                
                source.start(0);
                activeVoiceSourceRef.current = source;
                return; 
              }
            }
            
            // Standard Fallback
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; 
            utterance.volume = 0.8; 
            
            const voices = window.speechSynthesis.getVoices();
            let preferredVoice = null;
            
            if (voiceProfile === 'std_female' || voiceProfile === 'kore') {
              utterance.pitch = 1.05; 
              preferredVoice = voices.find(v => /samantha|victoria|karen|female|girl/i.test(v.name)) || voices.find(v => v.lang === 'en-US');
            } else {
              utterance.pitch = 0.7; 
              preferredVoice = voices.find(v => /david|daniel|arthur|alex|male|boy/i.test(v.name)) || voices.find(v => v.lang === 'en-GB' || v.lang === 'en-US');
            }
            
            if (preferredVoice) utterance.voice = preferredVoice;
            window.speechSynthesis.speak(utterance);
          };

          // Warmup Logic
          useEffect(() => {
            let timer;
            if (isWarmup) {
                if (warmupTimeLeft > 0) {
                    timer = setTimeout(() => {
                        setWarmupTimeLeft(w => w - 1);
                        triggerVibration('warmup');
                    }, 1000);
                } else {
                    setIsWarmup(false);
                    setIsRunning(true);
                    
                    const firstPhase = activeExercise.phases[0];
                    setTimeLeft(firstPhase.duration);
                    speakCommand(firstPhase.command);
                    playBreathSound(firstPhase.type, firstPhase.duration);
                    triggerVibration(firstPhase.type);
                }
            }
            return () => clearTimeout(timer);
          }, [isWarmup, warmupTimeLeft, activeExercise]);

          // Main Exercise Logic
          useEffect(() => {
            let timer;
            if (isRunning && activeExercise && !isWarmup) {
              if (timeLeft > 0) {
                timer = setTimeout(() => setTimeLeft(prev => +(prev - 0.1).toFixed(1)), 100);
              } else {
                const nextIndex = (currentPhaseIndex + 1) % activeExercise.phases.length;
                if (nextIndex === 0) setCycles(c => c + 1);
                
                const nextPhase = activeExercise.phases[nextIndex];
                setCurrentPhaseIndex(nextIndex);
                setTimeLeft(nextPhase.duration);
                
                speakCommand(nextPhase.command);
                playBreathSound(nextPhase.type, nextPhase.duration);
                triggerVibration(nextPhase.type);
              }
            }
            return () => clearTimeout(timer);
          }, [isRunning, timeLeft, currentPhaseIndex, activeExercise, isWarmup, voiceEnabled, breathSoundEnabled, voiceProfile]);

          const handleGlobalInteraction = () => {
            if (!showSplash) initAudioCtx();
            // Undim screen if tapped anywhere
            if (isDimmed) setIsDimmed(false);
          };

          const startExercise = async (ex) => {
            if (isGeneratingVoice) return;
            const ctx = initAudioCtx();
            abortLoadRef.current = false;

            if (voiceProfile === 'kore' || voiceProfile === 'fenrir') {
              setIsGeneratingVoice(true);
              const uniqueCommands = ["Get ready", ...new Set(ex.phases.map(p => p.command))];
              const aiVoiceName = voiceProfile === 'kore' ? 'Kore' : 'Fenrir';
              
              for (let i = 0; i < uniqueCommands.length; i++) {
                if (abortLoadRef.current) break;
                const cmd = uniqueCommands[i];
                const cacheKey = `${voiceProfile}_${cmd}`;
                if (!aiVoiceCache.current[cacheKey]) {
                  if (i > 0 && !LOCAL_AUDIO_ASSETS) await new Promise(r => setTimeout(r, 400)); 
                  const buffer = await generateGeminiTTS(cmd, aiVoiceName, ctx);
                  if (buffer) aiVoiceCache.current[cacheKey] = buffer;
                }
              }
              setIsGeneratingVoice(false);
            }

            if (abortLoadRef.current) return;

            setActiveExercise(ex);
            setCurrentPhaseIndex(0);
            setCycles(0);
            
            // Start Warmup Sequence
            setIsWarmup(true);
            setWarmupTimeLeft(3);
            setIsRunning(false);
            speakCommand("Get ready");
            
            if (ex.id === 'sleep' && selectedBgSound === 'none') setSelectedBgSound('ocean');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const togglePause = (e) => {
            e.stopPropagation(); // Prevent undimming immediately if user just wants to pause
            if (isRunning || isWarmup) {
              if (window.speechSynthesis) window.speechSynthesis.cancel();
              if (activeVoiceSourceRef.current) { try { activeVoiceSourceRef.current.stop(); } catch(e){} }
              if (breathSourceRef.current) { try { breathSourceRef.current.stop(); } catch(e){} }
              setIsRunning(false);
              setIsWarmup(false); // Pause cancels warmup, resumes directly into exercise
            } else if (activeExercise) {
              initAudioCtx();
              setIsRunning(true);
              speakCommand(activeExercise.phases[currentPhaseIndex].command);
              playBreathSound(activeExercise.phases[currentPhaseIndex].type, timeLeft);
            }
          };

          const haltEverything = () => {
            abortLoadRef.current = true;
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            if (activeVoiceSourceRef.current) { try { activeVoiceSourceRef.current.stop(); } catch(e){} }
            if (breathSourceRef.current) { try { breathSourceRef.current.stop(); } catch(e){} }
            setIsGeneratingVoice(false);
            setIsRunning(false);
            setIsWarmup(false);
          };

          const reset = (e) => {
            e.stopPropagation();
            haltEverything();
            setCurrentPhaseIndex(0);
            setCycles(0);
            setIsWarmup(true);
            setWarmupTimeLeft(3);
            speakCommand("Get ready");
          };

          const exitExercise = (e) => {
            if(e) e.stopPropagation();
            haltEverything();
            setActiveExercise(null);
            setIsDimmed(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const cycleAmbience = (e) => {
            e.stopPropagation();
            handleGlobalInteraction();
            const currentIndex = BG_SOUND_KEYS.indexOf(selectedBgSound);
            const nextIndex = (currentIndex + 1) % BG_SOUND_KEYS.length;
            setSelectedBgSound(BG_SOUND_KEYS[nextIndex]);
          };

          // --- UI RENDERING ---

          if (showSplash) {
            return (
              <div className="app-container flex flex-col items-center justify-center font-sans">
                <div className="flex flex-col items-center animate-pulse">
                  <h1 className="text-4xl font-light tracking-widest text-white mb-2">AuraBreath</h1>
                  <div className="h-[1px] w-12 bg-zinc-700 rounded-full mb-4"></div>
                  <h2 className="text-sm font-light text-zinc-500 uppercase tracking-widest">Calm & Focus</h2>
                </div>
              </div>
            );
          }

          if (activeExercise) {
            const currentPhase = activeExercise.phases[currentPhaseIndex];
            const progress = isWarmup ? (warmupTimeLeft / 3) : 1 - (timeLeft / currentPhase.duration);
            
            let circleScale = 1;
            if (!isWarmup) {
                if (currentPhase.type === 'inhale') circleScale = 1 + (0.5 * progress);
                if (currentPhase.type === 'exhale') circleScale = 1.5 - (0.5 * progress);
                if (currentPhase.type === 'hold') circleScale = 1.5;
            }

            return (
              <div onClick={handleGlobalInteraction} className="app-container flex flex-col font-sans select-none overflow-hidden cursor-pointer">
                
                {/* Dimmer Overlay (Makes background truly black when dimmed) */}
                <div className={`absolute inset-0 bg-black pointer-events-none transition-opacity duration-1000 z-0 ${isDimmed ? 'opacity-100' : 'opacity-0'}`}></div>

                {/* UI Wrapper: Fades out when dimmed */}
                <div className={`relative z-10 flex-1 flex flex-col transition-opacity duration-700 ${isDimmed ? 'opacity-0' : 'opacity-100'}`}>
                    {/* Header */}
                    <div className="p-4 flex items-center justify-between shrink-0 mt-2">
                      <button onClick={exitExercise} className="p-2 -ml-2 rounded-full hover:bg-zinc-800 transition-colors">
                        <ChevronLeft className="w-6 h-6" />
                      </button>
                      <div className="text-center">
                        <h2 className="font-bold text-base uppercase tracking-widest">{activeExercise.title}</h2>
                        <p className="text-zinc-500 text-[10px] uppercase tracking-tighter">Cycles: {cycles}</p>
                      </div>
                      {/* Dimmer Toggle */}
                      <button onClick={(e) => { e.stopPropagation(); setIsDimmed(true); }} className="p-2 -mr-2 rounded-full hover:bg-zinc-800 transition-colors text-zinc-400">
                        <EyeOff className="w-5 h-5" />
                      </button>
                    </div>

                    {/* Quick Controls */}
                    <div className="flex justify-center flex-wrap gap-2 px-2 shrink-0 mb-2">
                      <button onClick={(e) => { e.stopPropagation(); setVoiceEnabled(!voiceEnabled); }} className={`flex items-center gap-1.5 text-[9px] uppercase tracking-wider px-3 py-1.5 rounded-full border transition-all ${voiceEnabled ? 'border-zinc-400 bg-zinc-800 text-white' : 'border-zinc-800 text-zinc-500'}`}>
                        {voiceEnabled ? <Volume2 className="w-3 h-3" /> : <VolumeX className="w-3 h-3" />} Voice
                      </button>
                      <button onClick={(e) => { e.stopPropagation(); setBreathSoundEnabled(!breathSoundEnabled); }} className={`flex items-center gap-1.5 text-[9px] uppercase tracking-wider px-3 py-1.5 rounded-full border transition-all ${breathSoundEnabled ? 'border-zinc-400 bg-zinc-800 text-white' : 'border-zinc-800 text-zinc-500'}`}>
                        <Wind className="w-3 h-3" /> Breath
                      </button>
                      <button onClick={(e) => { e.stopPropagation(); setVibrationEnabled(!vibrationEnabled); }} className={`flex items-center gap-1.5 text-[9px] uppercase tracking-wider px-3 py-1.5 rounded-full border transition-all ${vibrationEnabled ? 'border-zinc-400 bg-zinc-800 text-white' : 'border-zinc-800 text-zinc-500'}`}>
                        {vibrationEnabled ? <Vibrate className="w-3 h-3" /> : <VibrateOff className="w-3 h-3" />} Haptics
                      </button>
                      <button onClick={cycleAmbience} className={`flex items-center gap-1.5 text-[9px] uppercase tracking-wider px-3 py-1.5 rounded-full border transition-all ${selectedBgSound !== 'none' ? 'border-zinc-400 bg-zinc-800 text-white' : 'border-zinc-800 text-zinc-500'}`}>
                        {BG_SOUNDS[selectedBgSound].icon} Amb
                      </button>
                    </div>
                </div>

                {/* Animation Area (Stays visible even when dimmed) */}
                <div className="flex-1 flex flex-col items-center justify-center p-4 relative w-full z-20 mt-[-60px]">
                  <div className="relative flex items-center justify-center w-56 h-56 my-6">
                    
                    <div 
                      className={`absolute inset-0 rounded-full blur-[60px] transition-all duration-100 ease-linear ${activeExercise.color} ${isDimmed ? 'opacity-10' : 'opacity-30'}`}
                      style={{ transform: `scale(${circleScale * 1.15})` }}
                    />
                    
                    <svg className={`absolute inset-0 w-full h-full -rotate-90 z-10 overflow-visible transition-opacity ${isDimmed ? 'opacity-30' : 'opacity-100'}`}>
                        <circle cx="112" cy="112" r="110" fill="none" stroke="currentColor" strokeWidth="2" className="text-zinc-900" />
                        <circle
                          cx="112" cy="112" r="110" fill="none" stroke="currentColor" strokeWidth="4"
                          strokeDasharray={691} strokeDashoffset={691 * (1 - progress)}
                          className={`transition-all duration-100 ease-linear ${
                            isWarmup ? 'text-zinc-500' :
                            currentPhase.type === 'inhale' ? 'text-emerald-400' : 
                            currentPhase.type === 'exhale' ? 'text-blue-400' : 'text-zinc-400'
                          }`}
                        />
                    </svg>
                    
                    <div 
                        className={`relative z-20 w-32 h-32 rounded-full flex items-center justify-center transition-all duration-100 ease-linear ${isWarmup ? 'bg-zinc-800' : activeExercise.color} shadow-[0_0_40px_rgba(0,0,0,0.5)] ${isDimmed ? 'opacity-50' : 'opacity-100'}`}
                        style={{ transform: `scale(${circleScale})` }}
                    >
                        <div className="text-5xl font-light text-white">{isWarmup ? warmupTimeLeft : Math.ceil(timeLeft)}</div>
                    </div>
                  </div>

                  {/* Phase Text (Fades out when dimmed) */}
                  <div className={`mt-8 text-center transition-opacity duration-700 ${isDimmed ? 'opacity-0' : 'opacity-100'}`}>
                    <h3 className="text-2xl font-black uppercase tracking-widest mb-1 min-h-[32px]">
                      {isWarmup ? 'Get Ready' : currentPhase.name}
                    </h3>
                    <p className="text-zinc-400 max-w-xs mx-auto italic text-sm min-h-[40px]">
                      {isWarmup ? 'Prepare to follow the guide' : currentPhase.command}
                    </p>
                  </div>
                </div>

                {/* Bottom Controls (Fades out when dimmed) */}
                <div className={`p-6 flex items-center justify-center gap-6 z-10 shrink-0 mb-4 transition-opacity duration-700 ${isDimmed ? 'opacity-0' : 'opacity-100'}`}>
                  <button onClick={reset} className="p-4 rounded-full bg-zinc-900 text-zinc-400 hover:text-white transition-colors">
                    <RefreshCw className="w-5 h-5" />
                  </button>
                  <button 
                    onClick={togglePause} 
                    className={`p-6 rounded-full ${isRunning || isWarmup ? 'bg-zinc-800' : 'bg-white text-black'} transition-all transform active:scale-95 shadow-xl`}
                  >
                    {isRunning || isWarmup ? <Pause className="w-8 h-8" fill="currentColor" /> : <Play className="w-8 h-8" fill="currentColor" />}
                  </button>
                  <div className="p-4 w-12 h-12" /> 
                </div>
              </div>
            );
          }

          return (
            <div onClick={handleGlobalInteraction} className="app-container p-4 font-sans flex flex-col relative">

              {isGeneratingVoice && (
                <div className="absolute inset-0 bg-black/90 backdrop-blur-md z-50 flex flex-col items-center justify-center p-6 text-center">
                  <button onClick={() => setIsGeneratingVoice(false)} className="absolute top-6 right-6 p-2 text-zinc-500 hover:text-white">
                     <X className="w-6 h-6" />
                  </button>
                  <Loader2 className="w-12 h-12 animate-spin text-emerald-500 mb-4" />
                  <h3 className="font-bold text-lg uppercase tracking-widest text-white">Loading Aura Voice</h3>
                  <p className="text-zinc-400 text-xs mt-2 leading-relaxed max-w-[250px]">
                    Generating studio-quality therapeutic voice instructions...
                  </p>
                </div>
              )}

              <header className="mb-6 mt-4 shrink-0 text-center">
                <h1 className="text-3xl font-light tracking-widest text-white leading-none mb-2">
                  AuraBreath
                </h1>
                <div className="h-[1px] w-8 bg-zinc-700 rounded-full mx-auto"></div>
              </header>

              <div className="grid grid-cols-2 gap-3 mb-6 shrink-0">
                <div className="bg-zinc-900/60 p-3 rounded-2xl border border-zinc-800/50 backdrop-blur-sm">
                  <div className="flex items-center gap-1.5 mb-3 text-zinc-400 text-[9px] uppercase tracking-widest font-bold">
                    <UserCircle className="w-3.5 h-3.5" /> Therapist Voice
                  </div>
                  <div className="grid grid-cols-2 gap-1.5">
                     <button onClick={() => { setVoiceProfile('kore'); handleGlobalInteraction(); }} className={`py-2 rounded-xl border transition-all ${voiceProfile === 'kore' ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400' : 'border-zinc-800/50 bg-black/50 text-zinc-500'}`}>
                       <span className="text-[9px] uppercase tracking-wider font-bold block">AI Fem</span>
                     </button>
                     <button onClick={() => { setVoiceProfile('fenrir'); handleGlobalInteraction(); }} className={`py-2 rounded-xl border transition-all ${voiceProfile === 'fenrir' ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-zinc-800/50 bg-black/50 text-zinc-500'}`}>
                       <span className="text-[9px] uppercase tracking-wider font-bold block">AI Male</span>
                     </button>
                  </div>
                </div>

                <div className="bg-zinc-900/60 p-3 rounded-2xl border border-zinc-800/50 backdrop-blur-sm">
                  <div className="flex items-center gap-1.5 mb-3 text-zinc-400 text-[9px] uppercase tracking-widest font-bold">
                    <Settings2 className="w-3.5 h-3.5" /> Ambience
                  </div>
                  <div className="grid grid-cols-2 gap-1.5">
                    {Object.entries(BG_SOUNDS).map(([key, sound]) => (
                      <button key={key} onClick={() => { setSelectedBgSound(key); handleGlobalInteraction(); }} className={`flex flex-col items-center justify-center py-1.5 rounded-xl border transition-all ${selectedBgSound === key ? 'border-zinc-400 bg-zinc-800 text-white' : 'border-zinc-800/50 bg-black/50 text-zinc-500'}`}>
                        {React.cloneElement(sound.icon, { className: 'w-3.5 h-3.5 mb-0.5' })}
                        <span className="text-[8px] uppercase tracking-wider text-center block">{sound.name}</span>
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              <div className="grid gap-3 pb-6 flex-1 overflow-y-auto pr-1 custom-scrollbar">
                {EXERCISES.map((ex) => (
                  <button
                    key={ex.id}
                    onClick={() => startExercise(ex)}
                    className="group relative flex items-center text-left bg-zinc-900/40 border border-zinc-800/80 p-4 rounded-2xl hover:border-zinc-600 hover:bg-zinc-800/50 transition-all active:scale-[0.98]"
                  >
                    <div className={`w-12 h-12 rounded-xl ${ex.color} flex items-center justify-center mr-4 shadow-lg group-hover:scale-105 transition-transform shrink-0`}>
                      {ex.icon}
                    </div>
                    <div className="flex-1 min-w-0">
                      <h3 className="font-bold text-[15px] leading-tight uppercase tracking-widest truncate mb-1">{ex.title}</h3>
                      <p className="text-zinc-500 text-[10px] uppercase tracking-widest truncate">{ex.subtitle}</p>
                    </div>
                    <div className="text-zinc-700 group-hover:text-zinc-400 transition-colors ml-2 shrink-0">
                      <Play className="w-5 h-5" fill="currentColor" />
                    </div>
                  </button>
                ))}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
