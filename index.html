        function App() {
          const [showSplash, setShowSplash] = useState(true);

          const [activeExercise, setActiveExercise] = useState(null);

          const [voiceEnabled, setVoiceEnabled] = useState(true);
          const [breathSoundEnabled, setBreathSoundEnabled] = useState(true);
          const [vibrationEnabled, setVibrationEnabled] = useState(true);
          const [isDimmed, setIsDimmed] = useState(false);
          
          // Runtime State
          const [isWarmup, setIsWarmup] = useState(false);
          const [warmupTimeLeft, setWarmupTimeLeft] = useState(0);
          const [isRunning, setIsRunning] = useState(false);
          const [currentPhaseIndex, setCurrentPhaseIndex] = useState(0);
          const [timeLeft, setTimeLeft] = useState(0);
          const [cycles, setCycles] = useState(0);

          const audioCtxRef = useRef(null);
          const breathSourceRef = useRef(null);
          const bgNodesRef = useRef({ source: null, gain: null, lfo: null });

          useEffect(() => {
            const timer = setTimeout(() => setShowSplash(false), 2000);
            return () => clearTimeout(timer);
          }, []);

          const initAudioCtx = () => {
            if (!audioCtxRef.current) {
              const Ctx = window.AudioContext || window.webkitAudioContext;
              audioCtxRef.current = new Ctx();
            }
            if (audioCtxRef.current.state === 'suspended') {
              audioCtxRef.current.resume();
            }
            return audioCtxRef.current;
          };

          const triggerVibration = (type) => {
            if (!vibrationEnabled || !navigator.vibrate) return;
            if (type === 'inhale') navigator.vibrate([40, 60, 40]);
            else if (type === 'exhale') navigator.vibrate([50]);
            else if (type === 'hold') navigator.vibrate([20]); 
            else if (type === 'warmup') navigator.vibrate([100]); 
          };

          const speakCommand = (text) => {
            if (!voiceEnabled || !window.speechSynthesis) return;
            window.speechSynthesis.cancel(); 
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; 
            utterance.volume = 0.8; 
            
            const voices = window.speechSynthesis.getVoices();
            // Try to find a calming, clear voice (often Samantha on Mac, or standard Google US English)
            const preferredVoice = voices.find(v => /samantha|female|girl/i.test(v.name)) || voices.find(v => v.lang === 'en-US');
            
            if (preferredVoice) utterance.voice = preferredVoice;
            window.speechSynthesis.speak(utterance);
          };

          const getNoiseBuffer = (ctx, type) => {
            const bufferSize = ctx.sampleRate * 3;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const output = buffer.getChannelData(0);
            
            if (type === 'pink') {
              let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
              for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                output[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
                b6 = white * 0.115926;
              }
            } else { // brown
              let lastOut = 0;
              for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3.5; 
              }
            }
            return buffer;
          };

          useEffect(() => {
            if (showSplash) return;
            const ctx = initAudioCtx();

            if (bgNodesRef.current.source) {
              try { bgNodesRef.current.source.stop(); } catch(e){}
              bgNodesRef.current.source.disconnect();
            }
            if (bgNodesRef.current.lfo) {
              try { bgNodesRef.current.lfo.stop(); } catch(e){}
              bgNodesRef.current.lfo.disconnect();
            }

            if (selectedBgSound === 'none') return;

            const masterGain = ctx.createGain();
            masterGain.gain.value = 0.3; 
            masterGain.connect(ctx.destination);
            bgNodesRef.current.gain = masterGain;

            const source = ctx.createBufferSource();
            source.loop = true;

            if (selectedBgSound === 'nature') {
              source.buffer = getNoiseBuffer(ctx, 'pink');
              const filter = ctx.createBiquadFilter();
              filter.type = 'lowpass';
              filter.frequency.value = 1200;
              source.connect(filter);
              filter.connect(masterGain);
            } else if (selectedBgSound === 'ocean') {
              source.buffer = getNoiseBuffer(ctx, 'brown');
              const filter = ctx.createBiquadFilter();
              filter.type = 'lowpass';
              filter.frequency.value = 400;
              const waveGain = ctx.createGain();
              waveGain.gain.value = 0.5;
              const lfo = ctx.createOscillator();
              lfo.type = 'sine';
              lfo.frequency.value = 0.1;
              const lfoGain = ctx.createGain();
              lfoGain.gain.value = 0.5;
              lfo.connect(lfoGain);
              lfoGain.connect(waveGain.gain);
              source.connect(filter);
              filter.connect(waveGain);
              waveGain.connect(masterGain);
              lfo.start();
              bgNodesRef.current.lfo = lfo;
            }

            source.start();
            bgNodesRef.current.source = source;

            return () => {
              if (bgNodesRef.current.source) {
                try { bgNodesRef.current.source.stop(); } catch(e){}
              }
            };
          }, [selectedBgSound, showSplash]);

          const playBreathSound = (type, durationSecs) => {
            if (!breathSoundEnabled) return;
            const ctx = initAudioCtx();

            if (breathSourceRef.current) {
              try { breathSourceRef.current.stop(); } catch (e) {}
            }

            const now = ctx.currentTime;

            if (type === 'hold') {
              const osc = ctx.createOscillator();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(45, now); 
              const gain = ctx.createGain();
              gain.gain.setValueAtTime(0, now);
              gain.gain.linearRampToValueAtTime(0.04, now + 0.5); 
              gain.gain.setValueAtTime(0.04, now + Math.max(0.5, durationSecs - 0.5));
              gain.gain.linearRampToValueAtTime(0, now + durationSecs); 
              
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start(now);
              osc.stop(now + durationSecs);
              breathSourceRef.current = osc;
              return;
            }

            const source = ctx.createBufferSource();
            source.buffer = getNoiseBuffer(ctx, 'brown');
            source.loop = true;
            
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.Q.value = 0.8; 

            const gainNode = ctx.createGain();

            source.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(ctx.destination);

            if (type === 'inhale') {
              filter.frequency.setValueAtTime(200, now);
              filter.frequency.exponentialRampToValueAtTime(900, now + durationSecs);
              gainNode.gain.setValueAtTime(0.01, now);
              gainNode.gain.linearRampToValueAtTime(0.3, now + durationSecs);
            } else { 
              filter.frequency.setValueAtTime(900, now);
              filter.frequency.exponentialRampToValueAtTime(150, now + durationSecs);
              gainNode.gain.setValueAtTime(0.3, now);
              gainNode.gain.linearRampToValueAtTime(0.01, now + durationSecs);
            }

            source.start(now);
            source.stop(now + durationSecs);
            breathSourceRef.current = source;
          };

          useEffect(() => {
            let timer;
            if (isWarmup) {
                if (warmupTimeLeft > 0) {
                    timer = setTimeout(() => {
                        setWarmupTimeLeft(w => w - 1);
                        triggerVibration('warmup');
                    }, 1000);
                } else {
                    setIsWarmup(false);
                    setIsRunning(true);
                    
                    const firstPhase = activeExercise.phases[0];
                    setTimeLeft(firstPhase.duration);
                    speakCommand(firstPhase.command);
                    playBreathSound(firstPhase.type, firstPhase.duration);
                    triggerVibration(firstPhase.type);
                }
            }
            return () => clearTimeout(timer);
          }, [isWarmup, warmupTimeLeft, activeExercise]);

          useEffect(() => {
            let timer;
            if (isRunning && activeExercise && !isWarmup) {
              if (timeLeft > 0) {
                timer = setTimeout(() => setTimeLeft(prev => +(prev - 0.1).toFixed(1)), 100);
              } else {
                const nextIndex = (currentPhaseIndex + 1) % activeExercise.phases.length;
                if (nextIndex === 0) setCycles(c => c + 1);
                
                const nextPhase = activeExercise.phases[nextIndex];
                setCurrentPhaseIndex(nextIndex);
                setTimeLeft(nextPhase.duration);
                
                speakCommand(nextPhase.command);
                playBreathSound(nextPhase.type, nextPhase.duration);
                triggerVibration(nextPhase.type);
              }
            }
            return () => clearTimeout(timer);
          }, [isRunning, timeLeft, currentPhaseIndex, activeExercise, isWarmup, voiceEnabled, breathSoundEnabled]);

          const handleGlobalInteraction = () => {
            if (!showSplash) initAudioCtx();
            if (isDimmed) setIsDimmed(false);
          };

          const startExercise = (ex) => {
            setActiveExercise(ex);
            setShowIntro(true);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const beginSession = () => {
            initAudioCtx();
            setShowIntro(false);
            setCurrentPhaseIndex(0);
            setCycles(0);
            setIsWarmup(true);
            setWarmupTimeLeft(3);
            setIsRunning(false);
            speakCommand("Get ready");
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const togglePause = (e) => {
            e.stopPropagation();
            if (isRunning || isWarmup) {
              if (window.speechSynthesis) window.speechSynthesis.cancel();
              if (breathSourceRef.current) { try { breathSourceRef.current.stop(); } catch(e){} }
              setIsRunning(false);
              setIsWarmup(false); 
            } else if (activeExercise) {
              initAudioCtx();
              setIsRunning(true);
              speakCommand(activeExercise.phases[currentPhaseIndex].command);
              playBreathSound(activeExercise.phases[currentPhaseIndex].type, timeLeft);
            }
          };

          const haltEverything = () => {
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            if (breathSourceRef.current) { try { breathSourceRef.current.stop(); } catch(e){} }
            setIsRunning(false);
            setIsWarmup(false);
          };

          const reset = (e) => {
            e.stopPropagation();
            haltEverything();
            setCurrentPhaseIndex(0);
            setCycles(0);
            setIsWarmup(true);
            setWarmupTimeLeft(3);
            speakCommand("Get ready");
          };

          const exitExercise = (e) => {
            if(e) e.stopPropagation();
            haltEverything();
            setActiveExercise(null);
            setShowIntro(false);
            setIsDimmed(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const cycleAmbience = (e) => {
            e.stopPropagation();
            handleGlobalInteraction();
            const currentIndex = BG_SOUND_KEYS.indexOf(selectedBgSound);
            const nextIndex = (currentIndex + 1) % BG_SOUND_KEYS.length;
            setSelectedBgSound(BG_SOUND_KEYS[nextIndex]);
          };

          const filteredExercises = useMemo(() => {
              if (selectedCategory === 'all') return EXERCISES;
              return EXERCISES.filter(ex => ex.category === selectedCategory);
          }, [selectedCategory]);

          if (showSplash) {
            return (
              <div className="app-container flex flex-col items-center justify-center font-sans">
                <div className="flex flex-col items-center animate-pulse">
                  <div className="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(16,185,129,0.3)]">
                      <Icons.Wind className="w-8 h-8 text-white" />
                  </div>
                  <h1 className="text-3xl font-bold tracking-tight text-white mb-2">Fitbeet Flow+</h1>
                  <h2 className="text-xs font-semibold text-emerald-500 uppercase tracking-widest">Masterclass</h2>
                </div>
              </div>
            );
          }

          if (activeExercise && showIntro) {
            return (
              <div className="app-container flex flex-col font-sans overflow-y-auto custom-scrollbar relative bg-black">
                
                <div className={`relative pt-12 pb-6 px-6 ${activeExercise.color} bg-opacity-20 flex flex-col items-center justify-center rounded-b-[40px] shadow-lg shrink-0`}>
                  <button onClick={exitExercise} className="absolute top-4 left-4 p-2 rounded-full bg-black/30 text-white hover:bg-black/50 transition-colors backdrop-blur-sm">
                    <Icons.ChevronLeft className="w-6 h-6" />
                  </button>
                  <div className={`w-20 h-20 rounded-full ${activeExercise.color} flex items-center justify-center shadow-xl mb-4 text-white transform scale-110`}>
                    {activeExercise.icon}
                  </div>
                  <h2 className="text-2xl font-bold text-center mb-1 text-white">{activeExercise.title}</h2>
                  <p className="text-sm font-bold uppercase tracking-wider opacity-80 text-center text-white">{activeExercise.subtitle}</p>
                </div>

                <div className="p-6 flex-1 flex flex-col gap-6">
                  
                  {/* The Two Visual Cards Concept */}
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-zinc-900/80 border border-zinc-800 rounded-2xl p-4 flex flex-col items-center text-center shadow-lg">
                      <div className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-emerald-400 mb-3 shadow-inner">
                        <Icons.User className="w-5 h-5" />
                      </div>
                      <h4 className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1">Позиція тіла</h4>
                      <p className="text-sm text-zinc-100 font-medium leading-tight">{activeExercise.details.position}</p>
                    </div>
                    <div className="bg-zinc-900/80 border border-zinc-800 rounded-2xl p-4 flex flex-col items-center text-center shadow-lg">
                      <div className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-blue-400 mb-3 shadow-inner">
                        <Icons.Brain className="w-5 h-5" />
                      </div>
                      <h4 className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1">Фокус</h4>
                      <p className="text-sm text-zinc-100 font-medium leading-tight">{activeExercise.details.focus}</p>
                    </div>
                  </div>

                  {/* Deep Dive Description */}
                  <div className="bg-zinc-900/50 rounded-2xl p-5 border border-zinc-800/50">
                    <h3 className="flex items-center gap-2 text-white font-bold mb-3 text-sm">
                      <Icons.Info className="w-4 h-4 text-emerald-500" /> Як це працює
                    </h3>
                    <p className="text-zinc-300 text-sm leading-relaxed">
                      {activeExercise.details.instructions}
                    </p>
                  </div>

                  {/* Breathing Phase Breakdown Timeline */}
                  <div>
                    <h3 className="text-xs font-bold text-zinc-500 uppercase tracking-widest mb-3 px-1">Цикл дихання</h3>
                    <div className="flex gap-1 h-10">
                      {activeExercise.phases.map((phase, idx) => {
                        const totalDuration = activeExercise.phases.reduce((acc, p) => acc + p.duration, 0);
                        const widthPct = (phase.duration / totalDuration) * 100;
                        const bgColor = phase.type === 'inhale' ? 'bg-white text-black' : phase.type === 'exhale' ? 'bg-zinc-700 text-white' : 'bg-zinc-800 text-zinc-400 border border-zinc-700';
                        return (
                          <div key={idx} style={{width: `${widthPct}%`}} className={`${bgColor} rounded-lg flex flex-col items-center justify-center text-xs overflow-hidden transition-all hover:opacity-80`}>
                            <span className="font-bold">{phase.duration}s</span>
                          </div>
                        )
                      })}
                    </div>
                    <div className="flex justify-between mt-2 px-1 text-[9px] text-zinc-500 uppercase font-bold tracking-wider">
                      {activeExercise.phases.map((p, i) => <span key={i}>{p.type}</span>)}
                    </div>
                  </div>
                </div>

                <div className="p-6 pt-0 mt-auto shrink-0 pb-8">
                  <button onClick={beginSession} className={`w-full py-4 rounded-2xl ${activeExercise.color} text-white font-bold text-lg shadow-[0_10px_30px_rgba(0,0,0,0.5)] transform transition active:scale-95 flex items-center justify-center gap-2`}>
                    <Icons.Play className="w-5 h-5" /> Почати практику
                  </button>
                </div>
              </div>
            );
          }

          if (activeExercise) {
            const currentPhase = activeExercise.phases[currentPhaseIndex];
            const progress = isWarmup ? (warmupTimeLeft / 3) : 1 - (timeLeft / currentPhase.duration);
            
            let circleScale = 1;
            if (!isWarmup) {
                if (currentPhase.type === 'inhale') circleScale = 1 + (0.4 * progress);
                if (currentPhase.type === 'exhale') circleScale = 1.4 - (0.4 * progress);
                if (currentPhase.type === 'hold') circleScale = 1.4;
            }

            return (
              <div onClick={handleGlobalInteraction} className="app-container flex flex-col font-sans select-none overflow-hidden cursor-pointer">
                <div className={`absolute inset-0 bg-black pointer-events-none transition-opacity duration-1000 z-0 ${isDimmed ? 'opacity-100' : 'opacity-0'}`}></div>

                <div className={`relative z-10 flex-1 flex flex-col transition-opacity duration-700 ${isDimmed ? 'opacity-0' : 'opacity-100'}`}>
                    <div className="p-4 flex items-center justify-between shrink-0 mt-2">
                      <button onClick={exitExercise} className="p-2 -ml-2 rounded-full hover:bg-zinc-800 transition-colors">
                        <Icons.ChevronLeft className="w-6 h-6" />
                      </button>
                      <div className="text-center">
                        <h2 className="font-bold text-base uppercase tracking-widest">{activeExercise.title}</h2>
                        <p className="text-emerald-500 font-bold text-[10px] uppercase tracking-tighter">Cycles: {cycles}</p>
                      </div>
                      <button onClick={(e) => { e.stopPropagation(); setIsDimmed(true); }} className="p-2 -mr-2 rounded-full hover:bg-zinc-800 transition-colors text-zinc-400">
                        <Icons.EyeOff className="w-5 h-5" />
                      </button>
                    </div>

                    <div className="flex justify-center flex-wrap gap-2 px-2 shrink-0 mb-2">
                      <button onClick={(e) => { e.stopPropagation(); setVoiceEnabled(!voiceEnabled); }} className={`flex items-center gap-1.5 text-[9px] uppercase font-bold tracking-wider px-3 py-1.5 rounded-full border transition-all ${voiceEnabled ? 'border-emerald-500/50 bg-emerald-500/10 text-emerald-400' : 'border-zinc-800 text-zinc-500'}`}>
                        {voiceEnabled ? <Icons.Volume2 className="w-3 h-3" /> : <Icons.VolumeX className="w-3 h-3" />} Voice
                      </button>
                      <button onClick={(e) => { e.stopPropagation(); setBreathSoundEnabled(!breathSoundEnabled); }} className={`flex items-center gap-1.5 text-[9px] uppercase font-bold tracking-wider px-3 py-1.5 rounded-full border transition-all ${breathSoundEnabled ? 'border-emerald-500/50 bg-emerald-500/10 text-emerald-400' : 'border-zinc-800 text-zinc-500'}`}>
                        <Icons.Wind className="w-3 h-3" /> Breath
                      </button>
                      <button onClick={(e) => { e.stopPropagation(); setVibrationEnabled(!vibrationEnabled); }} className={`flex items-center gap-1.5 text-[9px] uppercase font-bold tracking-wider px-3 py-1.5 rounded-full border transition-all ${vibrationEnabled ? 'border-emerald-500/50 bg-emerald-500/10 text-emerald-400' : 'border-zinc-800 text-zinc-500'}`}>
                        {vibrationEnabled ? <Icons.Vibrate className="w-3 h-3" /> : <Icons.VibrateOff className="w-3 h-3" />} Haptics
                      </button>
                    </div>
                </div>

                <div className="flex-1 flex flex-col items-center justify-center p-4 relative w-full z-20 mt-[-60px]">
                  <div className="relative flex items-center justify-center w-64 h-64 my-6">
                    
                    <div 
                      className={`absolute inset-0 rounded-full blur-[70px] transition-all duration-100 ease-linear ${activeExercise.color} ${isDimmed ? 'opacity-10' : 'opacity-20'}`}
                      style={{ transform: `scale(${circleScale * 1.15})` }}
                    />
                    
                    <svg className={`absolute inset-0 w-full h-full -rotate-90 z-10 overflow-visible transition-opacity ${isDimmed ? 'opacity-20' : 'opacity-100'}`}>
                        <circle cx="128" cy="128" r="126" fill="none" stroke="currentColor" strokeWidth="2" className="text-zinc-900" />
                        <circle
                          cx="128" cy="128" r="126" fill="none" stroke="currentColor" strokeWidth="4"
                          strokeDasharray={792} strokeDashoffset={792 * (1 - progress)}
                          className={`transition-all duration-100 ease-linear ${
                            isWarmup ? 'text-zinc-500' :
                            currentPhase.type === 'inhale' ? 'text-white' : 
                            currentPhase.type === 'exhale' ? 'text-zinc-400' : 'text-emerald-400'
                          }`}
                        />
                    </svg>
                    
                    <div 
                        className={`relative z-20 w-40 h-40 rounded-full flex items-center justify-center transition-all duration-100 ease-linear ${isWarmup ? 'bg-zinc-800' : activeExercise.color} shadow-[0_0_40px_rgba(0,0,0,0.4)] ${isDimmed ? 'opacity-40' : 'opacity-100'}`}
                        style={{ transform: `scale(${circleScale})` }}
                    >
                        <div className="text-6xl font-light text-white">{isWarmup ? warmupTimeLeft : Math.ceil(timeLeft)}</div>
                    </div>
                  </div>

                  <div className={`mt-8 text-center transition-opacity duration-700 ${isDimmed ? 'opacity-0' : 'opacity-100'}`}>
                    <h3 className="text-2xl font-bold tracking-tight mb-1 min-h-[32px]">
                      {isWarmup ? 'Get Ready' : currentPhase.name}
                    </h3>
                    <p className="text-emerald-400 max-w-xs mx-auto font-medium text-sm min-h-[40px] uppercase tracking-wider">
                      {isWarmup ? 'Prepare to follow the guide' : currentPhase.command}
                    </p>
                  </div>
                </div>

                <div className={`p-6 flex items-center justify-center gap-6 z-10 shrink-0 mb-4 transition-opacity duration-700 ${isDimmed ? 'opacity-0' : 'opacity-100'}`}>
                  <button onClick={reset} className="p-4 rounded-full bg-zinc-900 text-zinc-400 hover:text-white transition-colors">
                    <Icons.RefreshCw className="w-5 h-5" />
                  </button>
                  <button 
                    onClick={togglePause} 
                    className={`p-6 rounded-full ${isRunning || isWarmup ? 'bg-zinc-800 text-white' : 'bg-emerald-500 text-white'} transition-all transform active:scale-95 shadow-xl hover:scale-105`}
                  >
                    {isRunning || isWarmup ? <Icons.Pause className="w-8 h-8" /> : <Icons.Play className="w-8 h-8" />}
                  </button>
                  <button onClick={cycleAmbience} className={`p-4 rounded-full bg-zinc-900 ${selectedBgSound !== 'none' ? 'text-emerald-400' : 'text-zinc-400'} hover:text-white transition-colors`}>
                    {BG_SOUNDS[selectedBgSound].icon}
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div onClick={handleGlobalInteraction} className="app-container p-5 font-sans flex flex-col relative">

              <header className="mb-6 mt-2">
                <div className="flex items-center gap-3 mb-1">
                    <div className="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center shadow-lg shadow-emerald-500/20">
                        <Icons.Wind className="w-4 h-4 text-white" />
                    </div>
                    <h1 className="text-2xl font-bold tracking-tight text-white">
                    Fitbeet Flow+
                    </h1>
                </div>
                <p className="text-zinc-400 text-sm font-medium">What is your goal right now?</p>
              </header>

              {/* User Flow / Categories */}
              <div className="flex overflow-x-auto pb-4 -mx-5 px-5 gap-2 custom-scrollbar shrink-0">
                  {CATEGORIES.map(cat => (
                      <button 
                          key={cat.id}
                          onClick={() => setSelectedCategory(cat.id)}
                          className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all ${
                              selectedCategory === cat.id 
                              ? 'bg-emerald-500 text-white shadow-md shadow-emerald-500/20' 
                              : 'bg-zinc-900 text-zinc-400 border border-zinc-800 hover:border-zinc-600'
                          }`}
                      >
                          {cat.label}
                      </button>
                  ))}
              </div>

              <div className="flex items-center justify-between mt-2 mb-4">
                  <h2 className="text-zinc-300 font-bold uppercase tracking-wider text-xs">
                      {selectedCategory === 'all' ? 'All Practices' : CATEGORIES.find(c=>c.id === selectedCategory).label}
                  </h2>
                  <span className="text-zinc-600 text-xs font-bold">{filteredExercises.length} sessions</span>
              </div>

              {/* Exercises List */}
              <div className="grid gap-3 pb-6 flex-1 overflow-y-auto pr-1 custom-scrollbar">
                {filteredExercises.map((ex) => (
                  <button
                    key={ex.id}
                    onClick={() => startExercise(ex)}
                    className="group relative flex items-center text-left bg-zinc-900/40 border border-zinc-800/80 p-4 rounded-2xl hover:border-emerald-500/50 hover:bg-zinc-800/80 transition-all active:scale-[0.98]"
                  >
                    <div className={`w-14 h-14 rounded-2xl ${ex.color} flex items-center justify-center mr-4 shadow-lg group-hover:scale-105 transition-transform shrink-0`}>
                      {ex.icon}
                    </div>
                    <div className="flex-1 min-w-0 pr-2">
                      <h3 className="font-bold text-base text-zinc-100 leading-tight truncate mb-1">{ex.title}</h3>
                      <p className="text-emerald-500 font-bold text-[10px] uppercase tracking-wider truncate mb-1">{ex.subtitle}</p>
                      <p className="text-zinc-500 text-xs leading-snug line-clamp-2">{ex.description}</p>
                    </div>
                    <div className="text-zinc-700 group-hover:text-emerald-500 transition-colors shrink-0">
                      <Icons.Play className="w-6 h-6" />
                    </div>
                  </button>
                ))}
              </div>
              
              {/* Bottom fitbeet-style branding/nav placeholder */}
              <div className="mt-auto pt-4 border-t border-zinc-800/50 flex justify-center">
                  <div className="flex items-center gap-1.5 text-zinc-600 text-xs font-bold uppercase tracking-widest">
                      <Icons.Check className="w-4 h-4" /> Fitbeet Integrated
                  </div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
